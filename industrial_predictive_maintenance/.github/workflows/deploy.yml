name: Industrial Predictive Maintenance CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Run tests
        run: |
          pytest -q

      - name: Check code quality
        run: |
          flake8 app.py src tests --max-line-length=120 --extend-ignore=E402,E501

      - name: Verify Streamlit app starts
        run: |
          set -e
          python -m streamlit run app.py --server.headless true --server.port 8502 > streamlit.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8502/healthz >/dev/null 2>&1; then
              echo "Streamlit started successfully"
              exit 0
            fi
            sleep 2
          done
          echo "Streamlit failed to start"
          cat streamlit.log
          exit 1
